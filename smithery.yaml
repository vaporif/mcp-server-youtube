runtime: "container"

build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."

startCommand:
  type: "http"
  configSchema:
    type: "object"
    required:
      - YOUTUBE_API_KEY
    properties:
      YOUTUBE_API_KEY:
        type: "string"
        title: "YouTube API Key"
        description: "YouTube Data API v3 key. Get one at https://console.cloud.google.com/"
